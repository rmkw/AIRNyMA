<div class="card h-full border border-base-300 border-t-4 border-t-primary bg-base-100 shadow-sm">
  <div class="card-body gap-5 p-5">
    <div>
      <h2 class="card-title text-base">Datos del tabulado</h2>
      <p class="text-xs text-base-content/60">
        Captura la información general del tabulado.
      </p>
    </div>

    <div class="grid gap-4">
      <div class="grid gap-4 md:grid-cols-2">
        <div class="form-control">
          <label class="label" for="direccionTabulado">
            <span class="label-text text-xs font-medium">Unidad productora de información</span>
          </label>
          <select id="direccionTabulado" class="select select-sm select-bordered w-full"
            [(ngModel)]="direccionSeleccionada" name="direccionTabulado"
            (ngModelChange)="selectedDireccion($event)">
            <option value="" disabled>Selecciona una opción</option>
            @for (direccion of arrDirecciones; track direccion.idUnidad) {
            <option [value]="direccion.nameUnidad">{{ direccion.nameUnidad }}</option>
            }
          </select>
        </div>

        <div class="form-control">
          <label class="label" for="procesoTabulado">
            <span class="label-text text-xs font-medium">Proceso de producción</span>
          </label>
          <select id="procesoTabulado" class="select select-sm select-bordered w-full"
            [(ngModel)]="procesoSeleccionado" name="procesoTabulado"
            [disabled]="!procesosHabilitados" (ngModelChange)="seleccionarProceso($event)">
            <option value="" disabled>Selecciona una opción</option>
            @for (proceso of arrProcesosPBydire; track proceso.acronimo) {
            <option [value]="proceso.acronimo">{{ proceso.proceso }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-control">
        <label class="label" for="idTabulado">
          <span class="label-text text-xs font-medium">ID del tabulado</span>
        </label>
        <label class="input input-sm input-bordered flex w-full items-center gap-0" for="serialTabulado">
          <span class="font-medium text-base-content">{{ prefijoTabulado }}</span>
          <input id="serialTabulado" type="text" class="min-w-0 grow" inputmode="numeric" pattern="[0-9]*"
            [disabled]="!prefijoTabulado" [ngModel]="serialTabulado"
            (ngModelChange)="actualizarSerial($event)" name="serialTabulado" placeholder="001" />
        </label>
      </div>

      <div class="form-control">
        <label class="label" for="nombreTabulado">
          <span class="label-text text-xs font-medium">Tabulado</span>
        </label>
        <input id="nombreTabulado" type="text" class="input input-sm input-bordered w-full"
          [(ngModel)]="tabulado.tabulado" name="nombreTabulado" placeholder="Nombre del tabulado" />
      </div>

      <div class="form-control">
        <label class="label" for="tipoTabulado">
          <span class="label-text text-xs font-medium">Tipo</span>
        </label>
        <select id="tipoTabulado" class="select select-sm select-bordered w-full"
          [(ngModel)]="tabulado.tipo" name="tipoTabulado" disabled>
          <option value="">Catálogo pendiente</option>
        </select>
      </div>

      <div class="form-control">
        <label class="label" for="hojaTabulado">
          <span class="label-text text-xs font-medium">Hoja</span>
        </label>
        <input id="hojaTabulado" type="text" class="input input-sm input-bordered w-full"
          [(ngModel)]="tabulado.hoja" name="hojaTabulado" placeholder="Nombre de la hoja" />
      </div>

      <div class="form-control">
        <label class="label" for="urlAccesoTabulado">
          <span class="label-text text-xs font-medium">URL de acceso</span>
        </label>
        <input id="urlAccesoTabulado" type="url" class="input input-sm input-bordered w-full"
          [(ngModel)]="tabulado.urlAcceso" name="urlAccesoTabulado" placeholder="https://..." />
      </div>

      <div class="form-control">
        <label class="label" for="urlDescargaTabulado">
          <span class="label-text text-xs font-medium">URL de descarga</span>
        </label>
        <input id="urlDescargaTabulado" type="url" class="input input-sm input-bordered w-full"
          [(ngModel)]="tabulado.urlDescarga" name="urlDescargaTabulado" placeholder="https://..." />
      </div>

      <div class="form-control">
        <label class="label" for="comentarioTabulado">
          <span class="label-text text-xs font-medium">Comentario</span>
        </label>
        <textarea id="comentarioTabulado" class="textarea textarea-sm textarea-bordered min-h-24 w-full"
          [(ngModel)]="tabulado.comentarioA" name="comentarioTabulado"
          placeholder="Escribe un comentario"></textarea>
      </div>
    </div>

    <div class="rounded-xl border border-dashed border-base-300 bg-base-200/50 p-3 text-xs text-base-content/60">
      La persistencia se habilitará cuando se defina la integración con el API.
    </div>

    <div class="card-actions justify-end">
      <button type="button" class="btn btn-sm btn-primary" disabled>
        Guardar tabulado
      </button>
    </div>
  </div>
</div>
